name: Salesforce Deploy Full System
on:
  push:
    branches:
      - main

permissions:
  contents: write  # เพื่อให้ Pipeline มีสิทธิ์สร้างและ Push Tag กลับไปที่ Gi

jobs:
  Full_System_Deploy:
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Install Node & Salesforce CLI
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Plugins
        run: |
          npm install @salesforce/cli --global
          echo 'y' | sf plugins install sfdx-git-delta
        
      - name: Salesforce Authen
        run: |
          echo "${{ secrets.P_KEY2 }}" >> private.key
          sf org login jwt \
            --client-id ${{ secrets.TOKEN }} \
            --jwt-key-file "private.key" \
            --username ${{ secrets.USER_NAME2 }} \
            --alias my-org \
            --instance-url https://login.salesforce.com

      - name: Step 1 - Generate Delta (ดึงเฉพาะเลข SHA แถวเดียว)
        id: generate_delta
        run: | 
          mkdir -p delta
          # 1. ดึง Tag ทั้งหมดจาก Server ลงเครื่อง Runner
          git fetch --tags --force
          
          # 2. ตรรกะ Bash: หาเลข SHA ของสติกเกอร์ความสำเร็จล่าสุด
          if git rev-parse last_successful_deploy >/dev/null 2>&1; then
            FROM_SHA=$(git rev-parse last_successful_deploy)
            echo "พบจุดสำเร็จล่าสุด (Clear คอมมิท): $FROM_SHA"
          else
            # ถ้ายังไม่เคยสำเร็จ (Tag ไม่มี) ให้ใช้จุดก่อนการ Push ครั้งนี้
            FROM_SHA=${{ github.event.before }}
            echo "ยังไม่มีจุดสำเร็จ (สะสม การคอมมิท): เริ่มนับจาก $FROM_SHA"
          fi
          
          # 3. เช็คกรณีเลข 00000 (First Push) หรือ SHA ซ้ำกับปัจจุบันเพื่อให้ Summary โชว์ไฟล์เสมอ
          CURRENT_SHA=$(git rev-parse HEAD) # <--- เพิ่มบรรทัดนี้!
          
          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ] || \
             [ -z "$FROM_SHA" ] || \
             [ "$FROM_SHA" = "$CURRENT_SHA" ]; then # <--- เพิ่มเงื่อนไขเช็ค SHA ซ้ำตรงนี้!
            
            # ถ้าหาความต่างไม่ได้ ให้ถอยไป 1 ก้าวเสมอ เพื่อให้มี Diff โชว์ใน Summary
            FROM_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            echo "📍 ปรับจุดเริ่มต้นใหม่เพื่อให้เห็นความต่าง: $FROM_SHA"
          fi
          
          echo "FROM_SHA=$FROM_SHA" >> $GITHUB_ENV # <--- บรรทัดนี้สำคัญมาก! ต้องส่งออกไปให้ Step 1.5 ใช้
          echo "FROM_SHA ที่จะใช้ส่งให้ SGD และ Summary: $FROM_SHA"
          
          # 4. สั่ง SGD: ใส่ " " ครอบตัวแปรไว้กันแตก
          sf sgd source delta \
            --to HEAD \
            --from "$FROM_SHA" \
            --output-dir delta/ \
            --generate-delta

      - name: Step 1.1 - Check Files (กวาดไฟล์อะไรมาบ้าง ที่ใช้การ Deploy)
        run: |
          echo "--- รายการไฟล์ใน delta/force-app ---"
          find delta/force-app -type f || echo "ไม่มีไฟล์ใน force-app (อาจมีแต่การลบ)"

      - name: Step 1.2 - Check Delta Folder Structure
        run: |
          echo "--- โครงสร้างโฟลเดอร์ delta ---"
          ls -la delta/
          echo "--- โครงสร้างใน destructiveChanges ---"
          ls -la delta/destructiveChanges || echo "ไม่พบโฟลเดอร์ destructiveChanges"
          echo "--- โครงสร้างใน package ---"
          ls -la delta/package || echo "ไม่พบโฟลเดอร์ package"
      - name: Step 1.2.1 - Anti-Destructive (Salesforce Delta จะไม่มีระบบลบไฟล์ บน Org)
        run: |
          echo "บังคับปิดโหมดลบไฟล์: กำลังลบโฟลเดอร์ destructiveChanges..."
          rm -rf delta/destructiveChanges
          echo "ลบเรียบร้อย! Pipeline นี้จะไม่มีการลบ Metadata บน Org แน่นอน"

      - name: Step 1.3.1 - Read Destructive XML ()
        id: read_destructive
        run: |
          echo "--- ตรวจสอบรายการที่จะลบบน Org ---"
          if [ -f "delta/destructiveChanges/destructiveChanges.xml" ]; then
            cat delta/destructiveChanges/destructiveChanges.xml
            # เช็คว่ามีรายการสมาชิกที่จะลบจริงไหม
            if grep -q "<members>" delta/destructiveChanges/destructiveChanges.xml; then
              echo "HAS_DEL=true" >> $GITHUB_ENV
              echo "สถานะ: มีรายการสั่งลบ"
            else
              echo "HAS_DEL=false" >> $GITHUB_ENV
              echo "สถานะ: ข้อมูลการลบว่างเปล่า"
            fi
          else
            echo "HAS_DEL=false" >> $GITHUB_ENV
            echo "สถานะ: ไม่พบไฟล์ข้อมูลการลบ"
          fi

          echo "--- ตรวจสอบหน้าปก (Dummy Package) ---"
          cat delta/destructiveChanges/package.xml || echo "ไม่พบไฟล์หน้าปกสำหรับชุดลบ"

      - name: Step 1.3.2 - Read Package XML (ข้อมูลในการดีพลอยของไฟล์ต่างๆ)
        id: read_package
        run: |
          echo "--- ตรวจสอบรายการที่จะติดตั้งใหม่/อัปเดต ---"
          if [ -f "delta/package/package.xml" ]; then
            cat delta/package/package.xml
            if grep -q "<members>" delta/package/package.xml; then
              echo "HAS_PKG=true" >> $GITHUB_ENV
              echo "สถานะ: มีรายการไฟล์ใหม่ที่จะเตรียมดีพลอย"
            else
              echo "HAS_PKG=false" >> $GITHUB_ENV
              echo "สถานะ: ไม่มีไฟล์ใหม่ในการดีพลอย"
            fi
          else
            echo "HAS_PKG=false" >> $GITHUB_ENV
          fi

      - name: Step 1.3.3 - Final Decision (ตัดสินใจว่าจะ Deploy หรือไม่)
        run: |
          echo "สรุปผลการตรวจสอบ:"
          echo "มีการสั่งลบ (HAS_DEL): ${{ env.HAS_DEL }}"
          echo "มีการสั่งDeploy (HAS_PKG): ${{ env.HAS_PKG }}"

          if [ "${{ env.HAS_DEL }}" = "true" ] || [ "${{ env.HAS_PKG }}" = "true" ]; then
            echo "SHOULD_DEPLOY=true" >> $GITHUB_ENV
            echo "Action: ดำเนินการ Deploy ต่อไป"
          else
            echo "SHOULD_DEPLOY=false" >> $GITHUB_ENV
            echo "Action: ข้ามการ Deploy เนื่องจากไม่มีการเปลี่ยนแปลง"
          fi    

      - name: Step 1.4 - Read Deployment Package XML
        run: |
          echo "--- เนื้อหา package.xml (สำหรับ deploy) ---"
          cat delta/package/package.xml || echo "ไม่มีไฟล์ package สำหรับ deploy"

      - name: Step 1.5 - Set HAS_CHANGES Variable
        run: |
          if [ -f "delta/package/package.xml" ] && grep -q "<types>" delta/package/package.xml; then
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            echo "มีการเปลี่ยนแปลงที่ต้อง Deploy"
          else
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            echo "ไม่มีไฟล์ใหม่หรือไฟล์ที่แก้ไข"
          fi
      
      - name: Step 1.6 - Generate Full Sweep Summary
        # แก้จุดที่ 1: เปลี่ยนจาก SHOULD_DEPLOY เป็น HAS_CHANGES หรือเอา if ออกไปก่อน
        # เพราะบางครั้ง SHOULD_DEPLOY อาจเป็น false แต่เรายังอยากเห็นว่า diff มันได้ 0 ไฟล์จริงไหม
        if: always() 
        run: |
          echo "### 📝 สรุปการกวาดคอมมิท (Commit Sweep)" >> $GITHUB_STEP_SUMMARY
          echo "| Short SHA | Message | Author |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          
          # แก้จุดที่ 2: กันเหนียวกรณี git log ว่างเปล่าให้พิมพ์บอกในตาราง
          (git log ${{ env.FROM_SHA }}..HEAD --pretty=format:"| \`%h\` | %s | %an |" >> $GITHUB_STEP_SUMMARY) || echo "| - | No new commits | - |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📂 รายการไฟล์ทั้งหมดที่เปลี่ยนแปลง (Full File Sweep)" >> $GITHUB_STEP_SUMMARY
          
          # ดึงค่าจาก ENV ที่เราเซตไว้ใน Step 1
          TOTAL_FILES=$(git diff --name-only ${{ env.FROM_SHA }} HEAD | wc -l)
          echo "- **จำนวนไฟล์ที่ตรวจพบทั้งหมด:** \`$TOTAL_FILES\` ไฟล์" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$TOTAL_FILES" -gt 0 ]; then
            echo "#### 📄 รายชื่อไฟล์แยกตามสถานะ:" >> $GITHUB_STEP_SUMMARY
            echo "| Status | File Path |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
            git diff --name-status ${{ env.FROM_SHA }} HEAD | awk '{print "| " $1 " | " $2 " |"}' >> $GITHUB_STEP_SUMMARY
          else
            echo "> ⚠️ **ไม่มีไฟล์ที่เปลี่ยนแปลงใน Diff นี้** (เช็คค่า FROM_SHA: ${{ env.FROM_SHA }})" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 **Status Key:** [M] = Modified, [A] = Added, [D] = Deleted" >> $GITHUB_STEP_SUMMARY

      - name: Step 2 - ตรวจสอบความสมบูรณ์ของไฟล์ (ป้องกันการลืมไฟล์ XML) -
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "Checking for missing -meta.xml files..."
          # สคริปต์สั้นๆ เพื่อเช็คว่าถ้ามีไฟล์ .page หรือ .cls ต้องมี -meta.xml คู่กันในโฟลเดอร์ delta
          # ถ้าไม่มี ระบบจะไปก๊อปปี้มาจากโปรเจกต์หลักให้เอง (ถ้าไฟล์นั้นมีอยู่ใน git history)
          find delta/force-app -name "*.page" -o -name "*.cls" | while read f; do
            if [ ! -f "${f}-meta.xml" ]; then
              echo "Warning: ${f}-meta.xml missing in delta folder. Trying to recover..."
              cp "${f}-meta.xml" "delta/force-app/${f#delta/force-app/}-meta.xml" || echo "❌ Error: Cannot find source ${f}-meta.xml"
            fi
          done
      - name: Step 2.1 - ดึงรายชื่อ Test Classes
        if: env.HAS_CHANGES == 'true'
        run: |
          # ตรวจสอบว่าทุกบรรทัดภายใต้ run: | ต้องย่อหน้าเยื้องเข้าไป 2 หรือ 10 spaces ให้เท่ากัน
          TEST_CLASSES=$(grep -oE '<members>[^<]*Test[^<]*</members>' delta/package/package.xml | sed 's/<members>//g;s/<\/members>//g' | xargs)
          
          echo "TEST_CLASSES=$TEST_CLASSES" >> $GITHUB_ENV
          echo "รายชื่อ Test ที่จะรัน: $TEST_CLASSES"

      - name: Step 3 - Identify Deleted Metadata
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          echo "--- List of files to be DELETED from Salesforce ---"
          if grep -q "<members>" delta/destructiveChanges/destructiveChanges.xml 2>/dev/null; then
            grep "<members>" delta/destructiveChanges/destructiveChanges.xml | sed 's/^[[:space:]]*//;s/<members>//g;s/<\/members>//g'
          else
            echo "No files identified for deletion."
          fi

      - name: Step 3.1 - Identify New or Updated Metadata
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          echo "--- List of files to be DEPLOYED/UPDATED to Salesforce ---"
          if [ -d "delta/force-app" ]; then
            find delta/force-app -type f | sed 's|delta/force-app/||'
          else
            echo "No new or updated files identified."
          fi
      - name: Step 3.2 - Validate and Run Tests (Dry Run)
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          echo "Starting Dry Run Validation (Standard Required: 75%)"
          
          # ใช้ --junit เพื่อให้ระบบเก็บผลลัพธ์ และ --verbose เพื่อความละเอียด
          # เพิ่ม --coverage-format "terse" เพื่อให้มันสรุป % มาให้ดูด้วย
          VALIDATE_CMD="sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org my-org \
            --ignore-warnings \
            --dry-run \
            --wait 30"

          if [ -n "${{ env.TEST_CLASSES }}" ]; then
            echo "Running Specified Tests: ${{ env.TEST_CLASSES }}"
            # ห้ามใส่ " " ครอบ ${{ env.TEST_CLASSES }} เพื่อให้ Shell แยกเป็นหลายไฟล์
            $VALIDATE_CMD --test-level RunSpecifiedTests --tests ${{ env.TEST_CLASSES }} --verbose
          else
            echo "No specific tests found. Validating Metadata only..."
            $VALIDATE_CMD --test-level NoTestRun
          fi
          # --- เพิ่มเงื่อนไขตรวจสอบผล Validation ---
          if [ $? -eq 0 ]; then
            echo "Validation Passed: Actual Deployment"
          else
            echo "Validation Failed: (Store Component)"
            exit 1
          fi

      - name: Step 3.3 - Execute Actual Deployment
        if: env.SHOULD_DEPLOY == 'true'
        run: |
          echo "Validation passed! Starting actual deployment..."
          
          # 1. สั่ง Deploy จริง
          sf project deploy start \
            --manifest delta/package/package.xml \
            --target-org my-org \
            --test-level NoTestRun \
            --ignore-warnings \
            --wait 30
          
          # 2. เก็บผลสถานะ ($? คือ 0 ถ้าสำเร็จ)
          DEPLOY_STATUS=$?

          # 3. ตรรกะ "ถ้าพังให้ดอง (Store) ถ้าผ่านให้ล้าง (Clear)"
          if [ $DEPLOY_STATUS -eq 0 ]; then
            echo "Deploy Success! (Round 3 Success)"
            echo "Clear Commit: Add Tag 'last_successful_deploy'"
            
            # ต้องเซตชื่อก่อนแปะแท็ก ไม่งั้น Git จะงงครับ
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            # เลื่อนสติกเกอร์ (Tag) มาที่ Commit ปัจจุบัน (HEAD)
            git tag -f last_successful_deploy HEAD
            git push origin last_successful_deploy --force
          else
            echo "Deploy Failed! (Round 1 Error)"
            echo "Store Component: ไม่บันทึก Tag เพื่อให้รอบหน้าเปรียบเทียบจากจุดเดิม"
            # สั่งให้ Pipeline ขึ้นตัวแดงเพื่อให้พี่รู้ว่ามีงานค้าง
            exit 1 
          fi
 