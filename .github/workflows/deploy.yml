name: Salesforce Deploy Full System
on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  Full_System_Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Node & Salesforce CLI
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Plugins
        run: |
          npm install @salesforce/cli --global
          echo 'y' | sf plugins install sfdx-git-delta

      - name: Authenticate to Salesforce
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default
          rm sfdx_auth.txt

      - name: Step 1 - Generate Delta
        run: |
          rm -rf delta && mkdir -p delta
          FROM_SHA=${{ github.event.before }}
          if [ "$FROM_SHA" = "0000000000000000000000000000000000000000" ] || [ -z "$FROM_SHA" ]; then
            FROM_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
          fi
          sf sgd source delta --to HEAD --from $FROM_SHA --output delta/ --generate-delta

      # ---------------- Dry-run validation & Coverage Check ----------------
      - name: Step 2 - Validate & Extract Results
        id: dryrun
        run: |
          set -e
          if [ ! -f delta/package/package.xml ]; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
            exit 0
          fi

          # รัน Validate พร้อมรัน Test (ใช้ RunLocalTests เพื่อเช็ค Coverage)
          sf project deploy validate \
            --manifest delta/package/package.xml \
            --target-org my-org \
            --test-level RunLocalTests \
            --wait 30 \
            --json > validate_result.json || true

          # 1. รายชื่อที่โครงสร้างผ่าน
          PASS_STRUCT=$(jq -r '.result.details.componentSuccesses[].fullName' validate_result.json 2>/dev/null | sort -u | xargs)
          
          # 2. รายชื่อที่โครงสร้างพัง
          FAIL_STRUCT=$(jq -r '.result.details.componentFailures[].fullName' validate_result.json 2>/dev/null | sort -u | xargs)

          # 3. เช็ค Apex Coverage (ถ้าต่ำกว่า 75% ให้ถือว่าพัง)
          LOW_COV=$(jq -r '.result.details.runTestResult.codeCoverage[] | select(.totalPercent < 75) | .name' validate_result.json 2>/dev/null | xargs)

          # คัดกรอง PASSED จริง (ต้องผ่านโครงสร้าง และไม่อยู่ในกลุ่ม Low Coverage)
          FINAL_CUR_PASS=""
          FINAL_CUR_FAIL="$FAIL_STRUCT"

          for comp in $PASS_STRUCT; do
            if echo "$LOW_COV" | grep -qxw "$comp"; then
              FINAL_CUR_FAIL="$FINAL_CUR_FAIL $comp"
            else
              FINAL_CUR_PASS="$FINAL_CUR_PASS $comp"
            fi
          done

          echo "CUR_PASSED=$FINAL_CUR_PASS" >> $GITHUB_ENV
          echo "CUR_FAILED=$FINAL_CUR_FAIL" >> $GITHUB_ENV

      # ---------------- State Management ----------------
      - name: Sync State with deploy-state branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch state
          git fetch origin deploy-state:deploy-state || git checkout --orphan deploy-state && git rm -rf . && git commit --allow-empty -m "init"
          git checkout deploy-state
          mkdir -p state
          
          PREV_PASSED=$(cat state/passed.txt 2>/dev/null || echo "")
          CUR_PASSED="${{ env.CUR_PASSED }}"
          CUR_FAILED="${{ env.CUR_FAILED }}"

          normalize() { echo "$1" | tr ' ' '\n' | sed '/^$/d' | sort -u | xargs; }

          # Logic: (รวมของเก่าและของใหม่ที่ผ่าน) ลบออกด้วย (ของใหม่ที่พัง)
          # เพื่อให้แน่ใจว่าถ้าเราแก้ Component 3 แล้วพังอีก มันจะถูกถอดจากลิสต์ทันที
          ALL_POTENTIAL=$(normalize "$PREV_PASSED $CUR_PASSED")
          if [ -n "$CUR_FAILED" ]; then
            FINAL_PASSED=$(echo "$ALL_POTENTIAL" | tr ' ' '\n' | grep -vxF -f <(echo "$CUR_FAILED" | tr ' ' '\n') | xargs || echo "")
          else
            FINAL_PASSED="$ALL_POTENTIAL"
          fi

          echo "$FINAL_PASSED" > state/passed.txt
          echo "$(normalize "$CUR_FAILED")" > state/failed.txt

          git add state/passed.txt state/failed.txt
          git commit -m "Sync state: $GITHUB_RUN_ID" || echo "No changes"
          git push origin deploy-state --force
          
          echo "FINAL_PASSED_LIST=$FINAL_PASSED" >> $GITHUB_ENV
          echo "FINAL_FAILED_LIST=$(cat state/failed.txt)" >> $GITHUB_ENV
          git checkout main

      # ---------------- Final Decision & Deployment ----------------
      - name: Final Deploy Logic
        run: |
          set -e
          FAILED="${{ env.FINAL_FAILED_LIST }}"
          PASSED="${{ env.FINAL_PASSED_LIST }}"

          if [ -n "$FAILED" ] && [ "$FAILED" != " " ]; then
            echo "❌ ยังมีรายการที่ Error หรือ Coverage ไม่ถึง 75%: $FAILED"
            echo "กรุณาแก้ไขและ Push ใหม่เพื่อสะสมรายการให้ผ่านครบ"
            exit 0
          fi

          if [ -z "$PASSED" ]; then
            echo "ℹ️ ไม่มีข้อมูลที่พร้อม Deploy"
            exit 0
          fi

          echo "🚀 ทุกอย่างผ่านเกณฑ์แล้ว! กำลัง Deploy: $PASSED"
          
          # สร้าง Package.xml จากรายการสะสมทั้งหมด
          mkdir -p final_deploy
          # ใช้คำสั่ง sf project deploy start แบบระบุ metadata จะง่ายและแม่นยำกว่า
          META_ARGS=$(echo $PASSED | tr ' ' ',')
          
          sf project deploy start \
            --metadata "$META_ARGS" \
            --target-org my-org \
            --test-level RunLocalTests \
            --wait 30 \
            --json > deploy_result.json

          # ถ้าสำเร็จ ให้ล้าง State
          if [ "$(jq -r '.status' deploy_result.json)" = "Succeeded" ]; then
             echo "CLEAR_STATE=true" >> $GITHUB_ENV
          fi

      - name: Clear State on Success
        if: env.CLEAR_STATE == 'true'
        run: |
          git checkout deploy-state
          echo "" > state/passed.txt
          echo "" > state/failed.txt
          git add state/passed.txt state/failed.txt
          git commit -m "Clear state after successful deploy"
          git push origin deploy-state --force