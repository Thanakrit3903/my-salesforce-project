name: Salesforce CI-CD (Delta & Selective Deploy) - Optimized

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # จำเป็นสำหรับการคำนวณ Delta

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- 1. เพิ่ม Cache สำหรับ Salesforce CLI เพื่อลดเวลารันลง 1-2 นาที ---
      - name: Cache Salesforce CLI
        id: cache-sfdx
        uses: actions/cache@v3
        with:
          path: /usr/local/lib/node_modules/@salesforce/cli
          key: ${{ runner.os }}-sfdx-cli-v2

      - name: Install Salesforce CLI & SGD Plugin
        run: |
          if ! command -v sf &> /dev/null; then
            sudo npm install @salesforce/cli --global
          fi
          echo y | sf plugins install sfdx-git-delta

      # --- 2. Authenticate แบบปลอดภัย (ลบไฟล์ทันที) ---
      - name: Authenticate to Salesforce
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: |
          echo "$SFDX_AUTH_URL" > sfdx_auth.txt
          sf org login sfdx-url --sfdx-url-file sfdx_auth.txt --set-default
          rm sfdx_auth.txt # ลบไฟล์ทิ้งทันทีเพื่อความปลอดภัย

      # --- 3. สร้าง Delta Package ---
      - name: Create Delta Manifest
        run: |
          mkdir -p delta
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            sf sgd source delta --to HEAD --from origin/${{ github.base_ref }} --output delta/ --generate-delta
          else
            FROM_SHA=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            sf sgd source delta --to HEAD --from $FROM_SHA --output delta/ --generate-delta
          fi

      # --- 4. หาชื่อ Test Classes (ปรับปรุง: เช็คไฟล์ที่มีอยู่จริง + กันไฟล์ที่ถูกลบ) ---
      - name: Identify Unique Tests
        id: tests
        run: |
          # ใช้ --diff-filter=AM เพื่อเอาเฉพาะไฟล์ที่ เพิ่ม(A) หรือ แก้ไข(M) ไม่เอาไฟล์ที่ถูกลบ
          RANGE="${{ github.event.before || 'HEAD~1' }}"
          [ "${{ github.event_name }}" = "pull_request" ] && RANGE="origin/${{ github.base_ref }}"
          
          CHANGED_CLASSES=$(git diff --diff-filter=AM --name-only $RANGE HEAD | grep '\.cls$' | sed 's/.*\///;s/\.cls//' || true)
          
          FINAL_TESTS=""
          for cls in $CHANGED_CLASSES; do
            # ตรวจสอบ naming convention: [ClassName]Test.cls
            # ค้นหาในโฟลเดอร์ force-app ว่ามีไฟล์เทสนี้อยู่จริงไหม
            TEST_NAME="${cls%Test}Test"
            if find force-app -name "${TEST_NAME}.cls" | grep -q .; then
              FINAL_TESTS="$FINAL_TESTS $TEST_NAME"
            fi
          done

          # ทำความสะอาด String และลบตัวซ้ำ
          CLEAN_TESTS=$(echo $FINAL_TESTS | xargs -n1 | sort -u | xargs)
          
          echo "test_classes=$CLEAN_TESTS" >> $GITHUB_ENV
          echo "Found Valid Tests: $CLEAN_TESTS"

      # --- 5. Deploy (ปรับปรุง: ยืดหยุ่นตามสภาพแวดล้อมและผลลัพธ์การหา Test) ---
      - name: Deploy Selective Source
        run: |
          HAS_CHANGES=false
          if [ -f "delta/package/package.xml" ] && grep -q "<members>" delta/package/package.xml; then HAS_CHANGES=true; fi
          if [ -f "delta/destructiveChanges/destructiveChanges.xml" ] && grep -q "<members>" delta/destructiveChanges/destructiveChanges.xml; then HAS_CHANGES=true; fi

          if [ "$HAS_CHANGES" = "true" ]; then
            if [ -n "${{ env.test_classes }}" ]; then
              echo "Running with Specified Tests: ${{ env.test_classes }}"
              DEPLOY_ARGS="--test-level RunSpecifiedTests --tests ${{ env.test_classes }}"
            else
              echo "No valid Apex tests found. Using NoTestRun (or change to RunLocalTests for Production)."
              DEPLOY_ARGS="--test-level NoTestRun"
            fi

            sf project deploy start \
              --manifest delta/package/package.xml \
              --post-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
              $DEPLOY_ARGS \
              --wait 30
          else
            echo "No Salesforce metadata changes detected. Skipping deploy."
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Tests Run:** ${{ env.test_classes || 'None' }}" >> $GITHUB_STEP_SUMMARY
          [ -f delta/package/package.xml ] && echo "- **Delta Manifest Created**" >> $GITHUB_STEP_SUMMARY || echo "- **No Changes Detected**" >> $GITHUB_STEP_SUMMARY